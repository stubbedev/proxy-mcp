name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
          - goos: darwin
            goarch: amd64
            os: macos-latest
          - goos: darwin
            goarch: arm64
            os: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="proxy-mcp-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/$STAGE"
          # cgo on for darwin: launchd socket activation (launch_activate_socket)
          # needs it. Built natively on macos runners, so the SDK is present.
          # Linux stays cgo-free for a fully static binary.
          CGO_ENABLED=0
          if [ "${{ matrix.goos }}" = "darwin" ]; then CGO_ENABLED=1; fi
          export CGO_ENABLED GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
          go build -trimpath \
            -ldflags="-s -w -X main.BuildVersion=${VERSION}" \
            -o "dist/$STAGE/proxy-mcp" .
          cp README.md LICENSE "dist/$STAGE/" 2>/dev/null || true
          cd dist
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/proxy-mcp-*.tar.gz*
          retention-days: 7

  cache:
    name: push nix build to attic
    # Build the nix package for this tag and push its closure to the
    # self-hosted attic cache (nix.stubbe.dev/default) so `nix run`/flake
    # consumers and the dotfiles substituter pull a prebuilt binary instead
    # of recompiling. Independent of the Go release artifacts above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build package
        run: nix build .#proxy-mcp -L --print-out-paths | tee /tmp/proxy-mcp-outpaths

      - name: Push to attic
        # Best-effort: a cache-push failure (e.g. a transient 504 from the
        # single-vCPU cache box on a large closure) must not redden a release.
        # Retry with backoff, then give up softly.
        continue-on-error: true
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix run nixpkgs#attic-client -- login stubbe https://nix.stubbe.dev "$ATTIC_TOKEN"
          for attempt in 1 2 3; do
            if nix run nixpkgs#attic-client -- push default $(cat /tmp/proxy-mcp-outpaths); then
              exit 0
            fi
            echo "::warning::attic push attempt $attempt failed; retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::warning::attic push failed after 3 attempts; cache push is best-effort, continuing"

  docker:
    name: build + push docker image
    # Multi-arch image to GHCR, independent of the Go/nix artifacts. Uses the
    # repo's GITHUB_TOKEN (packages: write) — no extra secret needed.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/stubbedev/proxy-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        # Suppress the `*.dockerbuild` build-record artifact + job summary —
        # otherwise the publish job's download-artifact pulls that opaque blob
        # alongside the release tarballs and chokes on it.
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          # Only the per-arch build artifacts (goos-goarch); never any stray
          # artifact a sibling job might upload.
          pattern: "*-*"
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip prereleases — only stable tags update the tap formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Read sha256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sha
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.sha256' \
            --dir sha
          extract() {
            awk '{print $1}' "sha/proxy-mcp-${VERSION}-$1.tar.gz.sha256"
          }
          {
            echo "VERSION=${VERSION}"
            echo "SHA_DARWIN_ARM64=$(extract darwin-arm64)"
            echo "SHA_DARWIN_AMD64=$(extract darwin-amd64)"
            echo "SHA_LINUX_ARM64=$(extract linux-arm64)"
            echo "SHA_LINUX_AMD64=$(extract linux-amd64)"
          } >> "$GITHUB_ENV"

      - name: Check out homebrew tap
        uses: actions/checkout@v7
        with:
          repository: stubbedev/homebrew-proxy-mcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cat > tap/Formula/proxy-mcp.rb <<EOF
          class ProxyMcp < Formula
            desc "Aggregating MCP proxy with a real readiness gate"
            homepage "https://github.com/stubbedev/proxy-mcp"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/stubbedev/proxy-mcp/releases/download/v#{version}/proxy-mcp-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/proxy-mcp/releases/download/v#{version}/proxy-mcp-#{version}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/stubbedev/proxy-mcp/releases/download/v#{version}/proxy-mcp-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/proxy-mcp/releases/download/v#{version}/proxy-mcp-#{version}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "proxy-mcp"
            end

            service do
              run [opt_bin/"proxy-mcp", "--config", etc/"proxy-mcp/config.json"]
              keep_alive true
              log_path var/"log/proxy-mcp.log"
              error_log_path var/"log/proxy-mcp.log"
            end

            def caveats
              <<~EOS
                proxy-mcp's service reads a config from:
                  #{etc}/proxy-mcp/config.json
                Create it first (see https://github.com/stubbedev/proxy-mcp#configuration), then:
                  brew services start proxy-mcp
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/proxy-mcp --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/proxy-mcp.rb; then
            echo "Formula already up to date for ${VERSION}; nothing to do."
            exit 0
          fi
          git add Formula/proxy-mcp.rb
          git commit -m "proxy-mcp ${VERSION}"
          git push
