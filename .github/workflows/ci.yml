name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: go build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  schema:
    name: config schema in sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # real ref + write token so the master auto-commit can push back.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # config.schema.json is generated from the Go config structs. Regenerate
      # on every push; on master auto-commit any drift so the schema is always
      # current, on PRs fail so the author regenerates and commits.
      - name: regenerate config.schema.json
        run: go run ./cmd/schemagen > config.schema.json
      - name: assert schema in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain config.schema.json)" ]; then
            echo "::error::config.schema.json is out of date. Run 'just schema' (or 'go run ./cmd/schemagen > config.schema.json') and commit."
            git --no-pager diff config.schema.json
            exit 1
          fi
      - name: auto-commit schema (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [ -z "$(git status --porcelain config.schema.json)" ]; then
            echo "schema already in sync; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add config.schema.json
          git commit -m 'chore: auto-regenerate config.schema.json [skip ci]'
          git push origin HEAD:master

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: gofmt + go vet
        run: |
          unformatted=$(gofmt -l .)
          [ -z "$unformatted" ] || { echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1; }
          go vet ./...

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # need a real ref + write token so the auto-bump step can
          # push the refreshed vendorHash back to master.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock', '**/go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size-linux: 5G

      # Inline `just sync-flake`. Rewrites flake.nix's vendorHash to match
      # the current go.sum. On master pushes the result is auto-committed
      # (next step); on PRs we fail if it would change anything, so
      # reviewers see the drift instead of CI silently masking it.
      - name: sync flake.nix vendorHash
        run: |
          set -euo pipefail
          GO_SUM_HASH=$(sha256sum go.sum | awk '{print $1}')
          SENTINEL="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i -E 's|^(\s*vendorHash = )"sha256-[^"]*";|\1"'"$SENTINEL"'";|' flake.nix
          set +e
          OUT=$(nix build .#proxy-mcp --no-link 2>&1)
          BUILD_STATUS=$?
          set -e
          NEW_HASH=$(printf '%s\n' "$OUT" | awk '/got:[[:space:]]*sha256-/ {print $2; exit}')
          if [ -z "$NEW_HASH" ]; then
            if [ "$BUILD_STATUS" = "0" ]; then
              echo "::error::sync-flake: nix build unexpectedly succeeded with sentinel hash"
              echo "$OUT"
              exit 1
            fi
            echo "$OUT"
            echo "::error::sync-flake: nix build did not print 'got: sha256-…'"
            exit 1
          fi
          sed -i -E 's|^(\s*vendorHash = )"sha256-[^"]*";|\1"'"$NEW_HASH"'";|' flake.nix
          if grep -q '^[[:space:]]*# go-sum:' flake.nix; then
            sed -i -E 's|^(\s*# go-sum:).*|\1 '"$GO_SUM_HASH"'|' flake.nix
          else
            sed -i -E 's|^(\s*vendorHash = )|          # go-sum: '"$GO_SUM_HASH"'\n\1|' flake.nix
          fi
          echo "sync-flake: vendorHash=$NEW_HASH go-sum=$GO_SUM_HASH"

      - name: assert flake.nix in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain flake.nix)" ]; then
            echo "::error::flake.nix vendorHash is out of sync with go.sum. Run 'just sync-flake' locally and commit the result."
            git --no-pager diff flake.nix
            exit 1
          fi

      - name: auto-commit flake.nix bump (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [ -z "$(git status --porcelain flake.nix)" ]; then
            echo "flake.nix already in sync; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flake.nix
          git commit -m 'chore: auto-bump flake.nix vendorHash [skip ci]'
          git push origin HEAD:master

      - run: nix flake check --print-build-logs

      # Push the built package closure to the self-hosted xilo cache on
      # master pushes, so `nix run`/flake consumers tracking HEAD pull a
      # prebuilt binary instead of recompiling. Release tags push the same
      # way from release.yml's `cache` job. Best-effort: a cache-push
      # failure (e.g. a transient 504 from the single-vCPU cache box on a
      # large closure) must not redden CI.
      - name: setup xilo (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: stubbedev/xilo@v1
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}

      - name: push nix build to xilo (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          OUT=$(nix build .#proxy-mcp --no-link --print-out-paths)
          xilo push default $OUT
